<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#888888" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.55"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#ffffff" opacity="0.02"/>
    </pattern>
    <style>
      .txt {
        font-family: 'Courier New', Menlo, monospace;
        font-size: 19px;
        fill: #f0f6fc;
      }
      .dim { fill: #8b949e; }
      .cyan { fill: #9198a1; }
      .wipe {
        animation: type 1s steps(24, end) forwards;
        transform: translateX(0);
      }
      @keyframes type { to { transform: translateX(760px); } }
      .w1 { animation-delay: 0.3s; }
      .w2 { animation-delay: 1.4s; }
      .w3 { animation-delay: 2.5s; }
      .w4 { animation-delay: 3.6s; }
      .w5 { animation-delay: 4.7s; }
      .w6 { animation-delay: 5.8s; }
      .cursor { fill: #f0f6fc; animation: blink 1s steps(1) infinite; }
      @keyframes blink { 50% { opacity: 0; } }
    </style>
  </defs>

  <!-- gradient border frame -->
  <rect x="1" y="1" width="798" height="298" rx="12" fill="url(#border)"/>
  <rect x="3" y="3" width="794" height="294" rx="10" fill="#0d1117"/>

  <!-- title bar -->
  <path d="M3 13 a10 10 0 0 1 10-10 h774 a10 10 0 0 1 10 10 v20 h-794 z" fill="#161b22"/>
  <circle cx="24" cy="18" r="6" fill="#ffffff"/>
  <circle cx="44" cy="18" r="6" fill="#9198a1"/>
  <circle cx="64" cy="18" r="6" fill="#484f58"/>
  <text x="400" y="23" text-anchor="middle" class="txt dim" font-size="13">smzey@github: ~</text>

  <!-- terminal lines, each covered by a bg-colored rect that wipes right -->
  <g filter="url(#glow)">
    <g>
      <text x="24" y="70" class="txt"><tspan class="dim">$</tspan> whoami</text>
      <rect class="wipe w1" x="24" y="52" width="760" height="24" fill="#0d1117"/>
    </g>
    <g>
      <text x="24" y="100" class="txt cyan">smzey</text>
      <rect class="wipe w2" x="24" y="82" width="760" height="24" fill="#0d1117"/>
    </g>
    <g>
      <text x="24" y="140" class="txt"><tspan class="dim">$</tspan> ls ~/builds</text>
      <rect class="wipe w3" x="24" y="122" width="760" height="24" fill="#0d1117"/>
    </g>
    <g>
      <text x="24" y="170" class="txt cyan">hackathons/  freelance/  school/  labs/  games/  experiments/</text>
      <rect class="wipe w4" x="24" y="152" width="760" height="24" fill="#0d1117"/>
    </g>
    <g>
      <text x="24" y="210" class="txt"><tspan class="dim">$</tspan> uptime</text>
      <rect class="wipe w5" x="24" y="192" width="760" height="24" fill="#0d1117"/>
    </g>
    <g>
      <text x="24" y="240" class="txt cyan">shipping code, breaking nothing (mostly)</text>
      <rect class="wipe w6" x="24" y="222" width="760" height="24" fill="#0d1117"/>
    </g>
    <text x="24" y="278" class="txt"><tspan class="dim">$</tspan> <tspan class="cursor">&#9608;</tspan></text>
  </g>

  <!-- scanline overlay -->
  <rect x="3" y="3" width="794" height="294" rx="10" fill="url(#scan)"/>
</svg>
