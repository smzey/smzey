<svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .term-bg { fill: #0d1117; }
      .term-bar { fill: #161b22; }
      .dot { }
      .txt {
        font-family: 'Courier New', monospace;
        font-size: 20px;
        fill: #39ff14;
      }
      .cursor {
        fill: #39ff14;
        animation: blink 1s steps(1) infinite;
      }
      @keyframes blink {
        50% { opacity: 0; }
      }
      .line {
        opacity: 0;
        animation: reveal 0.4s ease forwards;
      }
      .l1 { animation-delay: 0.2s; }
      .l2 { animation-delay: 1.1s; }
      .l3 { animation-delay: 2.0s; }
      .l4 { animation-delay: 2.9s; }
      .l5 { animation-delay: 3.8s; }
      @keyframes reveal {
        to { opacity: 1; }
      }
    </style>
  </defs>

  <rect class="term-bg" width="800" height="200" rx="10"/>
  <rect class="term-bar" width="800" height="30" rx="10"/>
  <circle class="dot" cx="20" cy="15" r="6" fill="#ff5f56"/>
  <circle class="dot" cx="40" cy="15" r="6" fill="#ffbd2e"/>
  <circle class="dot" cx="60" cy="15" r="6" fill="#27c93f"/>

  <text x="20" y="65"  class="txt line l1">$ whoami</text>
  <text x="20" y="95"  class="txt line l2">&gt; smzey</text>
  <text x="20" y="125" class="txt line l3">$ status --check</text>
  <text x="20" y="155" class="txt line l4">&gt; shipping code, breaking nothing (mostly)</text>
  <text x="20" y="185" class="txt line l5">$ <tspan class="cursor">_</tspan></text>
</svg>
